<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <title>twon Admin - Giriş</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #0a0a0f;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    h2 {
      font-family: 'Space Grotesk', sans-serif;
      text-align: center;
      margin-top: 0;
      margin-bottom: 30px;
      font-size: 28px;
    }

    h2 span {
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #aaa;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: #a855f7;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }

    .error {
      color: #ff4444;
      font-size: 14px;
      text-align: center;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <h2><span>twon</span> Admin</h2>
    <div class="error" id="error-msg">Hatalı kullanıcı adı veya şifre!</div>
    <form action="/login" method="POST">
      <div class="input-group">
        <label for="username">Kullanıcı Adı</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="input-group">
        <label for="password">Şifre</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit">Giriş Yap</button>
    </form>
  </div>
  <script>
    if (window.location.search.includes('error=1')) {
      document.getElementById('error-msg').style.display = 'block';
    }
  </script>
</body>

</html>
